<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items - Flask Test Web</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main class="container">
        <h1>Items</h1>
        <p class="subtitle"><code>data/items.json</code> 파일의 내용입니다.</p>

        <section class="card">
            <table class="items-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>이름</th>
                        <th>분류</th>
                        <th>가격</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ item.id }}</td>
                        <td>{{ item.name }}</td>
                        <td>{{ item.category }}</td>
                        <td>{{ "{:,}".format(item.price) }}원</td>
                    </tr>
                    {% else %}
                    <tr><td colspan="4">데이터가 없습니다.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>

        <p><a href="{{ url_for('main.index') }}">← 홈으로</a></p>
    </main>
</body>
</html>
